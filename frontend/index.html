<!DOCTYPE html>
<html>

<head>

    <title>Distributed Drawing Board</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin-top: 20px;
        }

        canvas {
            background: white;
            border: 2px solid black;
            cursor: crosshair;
        }

        #toolbar {
            margin: 10px;
        }

        button {
            padding: 6px 12px;
            margin-right: 5px;
        }

        #status {
            margin-top: 10px;
            padding: 10px 15px;
            background: #e8f5e9;
            border: 1px solid #4caf50;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
            min-width: 300px;
            text-align: left;
        }

        .status-item {
            margin: 4px 0;
        }

        .status-label {
            font-weight: bold;
            color: #2e7d32;
        }

        .status-ok {
            color: #2e7d32;
        }

        .status-error {
            color: #d32f2f;
        }

    </style>

</head>

<body>

<h2>Real-Time Drawing Board</h2>

<div id="toolbar">
    <button onclick="setTool('brush')">Brush</button>
    <button onclick="setTool('eraser')">Eraser</button>
    <input type="color" id="colorPicker">
    <input type="range" id="sizePicker" min="1" max="10" value="2">
</div>

<canvas id="board" width="900" height="500"></canvas>

<div id="status">
    <div class="status-item"><span class="status-label">Status</span></div>
    <div class="status-item">Connection: <span id="connStatus" class="status-error">Connecting...</span></div>
    <div class="status-item">Strokes: <span id="strokeCount">0</span></div>
    <div class="status-item">Replicas Synced: <span id="replicaCount">0/3</span></div>
</div>

<script>

    /* =========================
       GLOBAL STATE
    ========================= */

    const canvas = document.getElementById("board")
    const ctx = canvas.getContext("2d")
    const colorPicker = document.getElementById("colorPicker")
    const sizePicker = document.getElementById("sizePicker")

    const ws = new WebSocket("ws://localhost:3000")

    let drawing = false
    let prevX = 0
    let prevY = 0
    let strokeCount = 0

    const state = {
        tool: "brush",
        color: "#000000",
        size: 2
    }

    ctx.lineCap = "round"
    ctx.lineJoin = "round"

    // Status update functions
    function updateConnStatus() {
        const connEl = document.getElementById("connStatus")
        if (ws.readyState === WebSocket.OPEN) {
            connEl.textContent = "Connected ✓"
            connEl.className = "status-ok"
        } else if (ws.readyState === WebSocket.CONNECTING) {
            connEl.textContent = "Connecting..."
            connEl.className = "status-error"
        } else {
            connEl.textContent = "Disconnected"
            connEl.className = "status-error"
        }
    }

    function updateStrokeCount() {
        document.getElementById("strokeCount").textContent = strokeCount
    }

    // Poll replica consistency every 2 seconds
    setInterval(() => {
        updateConnStatus()
    }, 500)

    updateConnStatus()

    /* =========================
       TOOL MANAGEMENT
    ========================= */

    function setTool(tool) {
        state.tool = tool
    }

    colorPicker.onchange = (e)=>{
        state.color = e.target.value
    }

    sizePicker.onchange = (e)=>{
        state.size = e.target.value
    }

    /* =========================
       MOUSE INPUT
    ========================= */



    canvas.addEventListener("mousedown", (e) => {

        drawing = true

        const rect = canvas.getBoundingClientRect()

        prevX = e.clientX - rect.left
        prevY = e.clientY - rect.top

    })

    canvas.addEventListener("mouseup", () => {
        drawing = false
    })

    canvas.addEventListener("mouseleave", () => {
        drawing = false
    })

    canvas.addEventListener("mousemove", (e) => {

        if (!drawing) return

        const rect = canvas.getBoundingClientRect()

        const x = e.clientX - rect.left
        const y = e.clientY - rect.top

        const stroke = {
            type: "stroke",
            tool: state.tool,
            color: state.color,
            size: state.size,
            x0: prevX,
            y0: prevY,
            x1: x,
            y1: y
        }

        if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(stroke))
        }

        prevX = x
        prevY = y

    })

    /* =========================
       WEBSOCKET RECEIVE
    ========================= */

    ws.onmessage = (event) => {

        const data = JSON.parse(event.data)

        if (data.type === "init") {
            strokeCount = data.strokes.length
            data.strokes.forEach(drawStroke)
            updateStrokeCount()
            return
        }

        if (data.type === "stroke") {
            strokeCount++
            drawStroke(data)
            updateStrokeCount()
        }

    }

    /* =========================
       RENDER ENGINE
    ========================= */

    function drawStroke(s) {

        ctx.beginPath()

        ctx.moveTo(s.x0, s.y0)
        ctx.lineTo(s.x1, s.y1)

        if (s.tool === "eraser") {
            ctx.strokeStyle = "white"
            ctx.lineWidth = 20
        } else {
            ctx.strokeStyle = s.color
            ctx.lineWidth = s.size
        }

        ctx.stroke()

    }

</script>

</body>

</html>
