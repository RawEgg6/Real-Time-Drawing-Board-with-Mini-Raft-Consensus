<!DOCTYPE html>
<html>

<head>

    <title>Distributed Drawing Board</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin-top: 20px;
        }

        canvas {
            background: white;
            border: 2px solid black;
            cursor: crosshair;
        }

        #toolbar {
            margin: 10px;
        }

        button {
            padding: 6px 12px;
            margin-right: 5px;
        }

        #status {
            margin-top: 10px;
            padding: 10px 15px;
            background: #e8f5e9;
            border: 1px solid #4caf50;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
            min-width: 300px;
            text-align: left;
        }

        .status-item {
            margin: 4px 0;
        }

        .status-label {
            font-weight: bold;
            color: #2e7d32;
        }

        .status-ok {
            color: #2e7d32;
        }

        .status-error {
            color: #d32f2f;
        }

    </style>

</head>

<body>

<h2>Real-Time Drawing Board</h2>

<div id="toolbar">
    <button onclick="setTool('brush')">Brush</button>
    <button onclick="setTool('eraser')">Eraser</button>
    <button onclick="clearBoard()">Clear Board</button>
    <button onclick="toggleOfflineMode()">Toggle Offline Demo</button>
    <input type="color" id="colorPicker">
    <input type="range" id="sizePicker" min="1" max="10" value="2">
</div>

<canvas id="board" width="900" height="500"></canvas>

<div id="status">
    <div class="status-item"><span class="status-label">Status</span></div>
    <div class="status-item">Connection: <span id="connStatus" class="status-error">Connecting...</span></div>
    <div class="status-item">Strokes: <span id="strokeCount">0</span></div>
    <div class="status-item">Offline Queue: <span id="pendingCount">0</span></div>
    <div class="status-item">Replicas Synced: <span id="replicaCount">0/3</span></div>
</div>

<script>

    /* =========================
       GLOBAL STATE
    ========================= */

    const canvas = document.getElementById("board")
    const ctx = canvas.getContext("2d")
    const colorPicker = document.getElementById("colorPicker")
    const sizePicker = document.getElementById("sizePicker")

    const WS_PROTOCOL = window.location.protocol === "https:" ? "wss" : "ws"
    const WS_URL = `${WS_PROTOCOL}://${window.location.host}`
    const INTERNET_PROBE_URLS = [
        "https://www.gstatic.com/generate_204",
        "https://www.google.com/generate_204"
    ]
    const OFFLINE_QUEUE_KEY = "drawing_offline_queue_v1"
    const CLIENT_ID_KEY = "drawing_client_id_v1"

    let ws = null

    let drawing = false
    let prevX = 0
    let prevY = 0
    let strokeCount = 0
    let queuedStrokes = []
    let forcedOfflineMode = false
    let reconnectTimer = null
    let internetReachable = true
    let probeFailureCount = 0
    let probeTimer = null

    const seenStrokeIds = new Set()

    function getClientId() {
        let id = localStorage.getItem(CLIENT_ID_KEY)

        if (!id) {
            id = `client_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`
            localStorage.setItem(CLIENT_ID_KEY, id)
        }

        return id
    }

    const clientId = getClientId()

    const state = {
        tool: "brush",
        color: "#000000",
        size: 2
    }

    ctx.lineCap = "round"
    ctx.lineJoin = "round"

    // Status update functions
    function updateConnStatus() {
        const connEl = document.getElementById("connStatus")

        if (forcedOfflineMode) {
            connEl.textContent = "Offline Demo Mode"
            connEl.className = "status-error"
        } else if (!navigator.onLine) {
            connEl.textContent = forcedOfflineMode ? "Offline Demo Mode" : "Offline (browser)"
            connEl.className = "status-error"
        } else if (!internetReachable) {
            connEl.textContent = "Disconnected"
            connEl.className = "status-error"
        } else if (ws && ws.readyState === WebSocket.OPEN) {
            connEl.textContent = "Connected ✓"
            connEl.className = "status-ok"
        } else if (ws && ws.readyState === WebSocket.CONNECTING) {
            connEl.textContent = "Connecting..."
            connEl.className = "status-error"
        } else {
            connEl.textContent = "Disconnected"
            connEl.className = "status-error"
        }
    }

    function updateStrokeCount() {
        document.getElementById("strokeCount").textContent = strokeCount
    }

    function updatePendingCount() {
        document.getElementById("pendingCount").textContent = queuedStrokes.length
    }

    function loadQueuedStrokes() {
        try {
            const raw = localStorage.getItem(OFFLINE_QUEUE_KEY)
            const parsed = raw ? JSON.parse(raw) : []

            if (Array.isArray(parsed)) {
                queuedStrokes = parsed
            }
        } catch (err) {
            queuedStrokes = []
        }

        updatePendingCount()
    }

    function saveQueuedStrokes() {
        localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queuedStrokes))
        updatePendingCount()
    }

    function queueOfflineStroke(stroke) {
        queuedStrokes.push(stroke)
        saveQueuedStrokes()
    }

    function scheduleReconnect() {
        if (reconnectTimer || isOfflineMode()) {
            return
        }

        reconnectTimer = setTimeout(() => {
            reconnectTimer = null
            connectWebSocket()
        }, 1000)
    }

    function toggleOfflineMode() {
        forcedOfflineMode = !forcedOfflineMode

        if (forcedOfflineMode && ws && ws.readyState === WebSocket.OPEN) {
            ws.close()
        }

        if (!forcedOfflineMode) {
            connectWebSocket()
            flushQueuedStrokes()
        }

        updateConnStatus()
    }

    function clearBoardLocal() {
        ctx.clearRect(0, 0, canvas.width, canvas.height)
        seenStrokeIds.clear()
        strokeCount = 0
        queuedStrokes = []
        saveQueuedStrokes()
        updateStrokeCount()
    }

    function clearBoard() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            return
        }

        ws.send(JSON.stringify({ type: "clear" }))
    }

    function isOfflineMode() {
        return forcedOfflineMode || !navigator.onLine || !internetReachable
    }

    async function probeInternetConnectivity() {
        if (forcedOfflineMode || !navigator.onLine) {
            internetReachable = false
            probeFailureCount = 0
            updateConnStatus()
            return
        }

        let reachable = false

        for (const probeUrl of INTERNET_PROBE_URLS) {
            try {
                const controller = new AbortController()
                const timeout = setTimeout(() => controller.abort(), 2500)

                await fetch(probeUrl, {
                    mode: "no-cors",
                    cache: "no-store",
                    signal: controller.signal
                })

                clearTimeout(timeout)
                reachable = true
                break
            } catch (err) {
                // try next probe URL
            }
        }

        if (reachable) {
            internetReachable = true
            probeFailureCount = 0
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connectWebSocket()
            }
        } else {
            probeFailureCount += 1
            if (probeFailureCount >= 2) {
                internetReachable = false
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.close()
                }
            }
        }

        updateConnStatus()
    }

    function flushQueuedStrokes() {
        if (isOfflineMode() || !ws || ws.readyState !== WebSocket.OPEN || queuedStrokes.length === 0) {
            return
        }

        ws.send(JSON.stringify({
            type: "batch",
            strokes: queuedStrokes
        }))

        queuedStrokes = []
        saveQueuedStrokes()
    }

    function renderIfNew(stroke) {
        if (!stroke || stroke.type !== "stroke") return

        if (stroke.id && seenStrokeIds.has(stroke.id)) {
            return
        }

        if (stroke.id) {
            seenStrokeIds.add(stroke.id)
        }

        drawStroke(stroke)
        strokeCount++
        updateStrokeCount()
    }

    function connectWebSocket() {
        if (isOfflineMode()) {
            return
        }

        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            return
        }

        ws = new WebSocket(WS_URL)

        ws.onopen = () => {
            updateConnStatus()
            flushQueuedStrokes()

            if (reconnectTimer) {
                clearTimeout(reconnectTimer)
                reconnectTimer = null
            }
        }

        ws.onclose = () => {
            updateConnStatus()

            if (!isOfflineMode()) {
                scheduleReconnect()
            }
        }

        ws.onerror = () => {
            updateConnStatus()
        }

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data)

            if (data.type === "init") {
                // Rehydrate any server strokes without wiping locally rendered offline strokes.
                data.strokes.forEach(renderIfNew)
                queuedStrokes.forEach(renderIfNew)
                updateStrokeCount()
                updatePendingCount()
                flushQueuedStrokes()
                return
            }

            if (data.type === "stroke") {
                renderIfNew(data)
            }

            if (data.type === "clear") {
                clearBoardLocal()
            }
        }
    }

    // Poll replica consistency every 2 seconds
    setInterval(() => {
        updateConnStatus()

        if (!isOfflineMode() && (!ws || ws.readyState === WebSocket.CLOSED)) {
            connectWebSocket()
        }
    }, 500)

    loadQueuedStrokes()
    probeInternetConnectivity()
    connectWebSocket()
    updateConnStatus()

    probeTimer = setInterval(probeInternetConnectivity, 3000)

    /* =========================
       TOOL MANAGEMENT
    ========================= */

    function setTool(tool) {
        state.tool = tool
    }

    colorPicker.onchange = (e)=>{
        state.color = e.target.value
    }

    sizePicker.onchange = (e)=>{
        state.size = e.target.value
    }

    /* =========================
       MOUSE INPUT
    ========================= */



    canvas.addEventListener("mousedown", (e) => {

        drawing = true

        const rect = canvas.getBoundingClientRect()

        prevX = e.clientX - rect.left
        prevY = e.clientY - rect.top

    })

    canvas.addEventListener("mouseup", () => {
        drawing = false
    })

    canvas.addEventListener("mouseleave", () => {
        drawing = false
    })

    canvas.addEventListener("mousemove", (e) => {

        if (!drawing) return

        const rect = canvas.getBoundingClientRect()

        const x = e.clientX - rect.left
        const y = e.clientY - rect.top

        const stroke = {
            type: "stroke",
            id: `${clientId}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
            clientId,
            ts: Date.now(),
            tool: state.tool,
            color: state.color,
            size: state.size,
            x0: prevX,
            y0: prevY,
            x1: x,
            y1: y
        }

        // Draw immediately for smooth UX in both online and offline mode.
        renderIfNew(stroke)

        if (!isOfflineMode() && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(stroke))
        } else {
            queueOfflineStroke(stroke)
        }

        prevX = x
        prevY = y

    })

    /* =========================
       WEBSOCKET RECEIVE
    ========================= */

    window.addEventListener("online", () => {
        if (forcedOfflineMode) {
            return
        }

        internetReachable = true
        probeFailureCount = 0
        connectWebSocket()
        updateConnStatus()
        flushQueuedStrokes()
    })

    window.addEventListener("offline", () => {
        internetReachable = false

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.close()
        }

        updateConnStatus()
    })

    /* =========================
       RENDER ENGINE
    ========================= */

    function drawStroke(s) {

        ctx.beginPath()

        ctx.moveTo(s.x0, s.y0)
        ctx.lineTo(s.x1, s.y1)

        if (s.tool === "eraser") {
            ctx.strokeStyle = "white"
            ctx.lineWidth = 20
        } else {
            ctx.strokeStyle = s.color
            ctx.lineWidth = s.size
        }

        ctx.stroke()

    }

</script>

</body>

</html>
