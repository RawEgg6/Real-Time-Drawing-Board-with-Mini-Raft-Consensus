<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawing Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #f7f7f6;
      --surface:    #ffffff;
      --border:     #e8e8e6;
      --border2:    #d4d4d0;
      --text:       #1a1a18;
      --text-2:     #6b6b67;
      --text-3:     #a8a8a4;
      --accent-ok:  #16a34a;
      --accent-err: #dc2626;
      --radius:     8px;
      --r-sm:       5px;
    }

    [data-theme="dark"] {
      --bg:         #0a0a0a;
      --surface:    #141414;
      --border:     #27272a;
      --border2:    #3f3f46;
      --text:       #f4f4f5;
      --text-2:     #a1a1aa;
      --text-3:     #71717a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      display: grid;
      grid-template-columns: 56px 1fr 220px;
      grid-template-rows: 44px 1fr;
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* TOPBAR */
    #topbar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      transition: background 0.3s, border-color 0.3s;
    }
    #topbar h1 {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-right: auto;
    }
    .dot-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: 'Geist Mono', monospace;
      color: var(--text-2);
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-err);
      transition: background 0.3s;
    }
    .dot.ok { background: var(--accent-ok); }
    
    #themeToggle {
      background: transparent;
      border: none;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: var(--r-sm);
      transition: color 0.2s, background 0.2s;
    }
    #themeToggle:hover {
      color: var(--text);
      background: var(--bg);
    }

    /* LEFT TOOLBAR */
    #toolbar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 2px;
      transition: background 0.3s, border-color 0.3s;
    }
    .tool-btn {
      width: 36px; height: 36px;
      border-radius: var(--r-sm);
      border: none;
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: background 0.1s, color 0.1s;
      position: relative;
    }
    .tool-btn:hover { background: var(--bg); color: var(--text-2); }
    .tool-btn.active { background: var(--text); color: var(--bg); }
    .tool-sep { width: 20px; height: 1px; background: var(--border); margin: 5px 0; }

    /* tooltip */
    .tool-btn::after {
      content: attr(data-tip);
      position: absolute;
      left: 44px; top: 50%;
      transform: translateY(-50%);
      background: var(--text);
      color: var(--bg);
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: var(--r-sm);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 20;
    }
    .tool-btn:hover::after { opacity: 1; }

    /* CANVAS WRAP */
    #canvas-wrap {
      background: var(--bg);
      background-image: radial-gradient(circle, var(--border2) 1px, transparent 1px);
      background-size: 20px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.3s;
    }
    #board {
      background: #ffffff; /* Keep board white like standard paper */
      box-shadow: 0 0 0 1px var(--border2), 0 4px 24px rgba(0,0,0,0.07);
      cursor: crosshair;
      display: block;
      border-radius: 2px;
    }

    /* RIGHT PANEL */
    #panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: background 0.3s, border-color 0.3s;
    }
    .sec-label {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }

    /* SWATCHES */
    #swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
    .swatch {
      width: 100%; aspect-ratio: 1;
      border-radius: 4px;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
    }
    .swatch:hover { transform: scale(1.1); }
    .swatch.active { border-color: var(--text); transform: scale(1.06); }
    #customColor {
      margin-top: 6px; width: 100%; height: 28px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      background: var(--bg);
      padding: 2px;
    }

    /* BRUSH PREVIEW */
    #brushPreviewWrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      height: 52px; overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }
    #brushPreview { width: 100%; height: 52px; border-radius: var(--radius); display: block; }

    /* SLIDERS */
    .slider-row {
      display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;
    }
    .slider-val {
      font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text-2);
    }
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px;
      border-radius: 2px; background: var(--border2); outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: var(--text); cursor: pointer;
      border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--border2);
    }
    #opacitySlider { background: linear-gradient(to right, var(--border), var(--text)); }

    /* STATS */
    .stat-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-2); padding: 2px 0; }
    .stat-val { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text); }

    /* LOG */
    #log { display: flex; flex-direction: column; gap: 2px; }
    .log-entry {
      font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--text-3);
      padding: 2px 6px 2px 8px; border-left: 2px solid var(--border);
      line-height: 1.5; animation: slideIn 0.15s ease;
    }
    .log-entry.stroke  { border-color: var(--border2); color: var(--text-2); }
    .log-entry.connect { border-color: #93c5fd; color: #2563eb; }
    .log-entry.sync    { border-color: #86efac; color: #15803d; }
    
    [data-theme="dark"] .log-entry.connect { border-color: #1e3a8a; color: #60a5fa; }
    [data-theme="dark"] .log-entry.sync    { border-color: #14532d; color: #4ade80; }

    @keyframes slideIn { from { opacity:0; transform:translateY(-3px); } to { opacity:1; transform:none; } }

    /* CLEAR */
    #clearBtn {
      width: 100%; padding: 7px;
      background: transparent; border: 1px solid var(--border2);
      border-radius: var(--radius); color: var(--text-2);
      font-family: 'Geist', sans-serif; font-size: 11px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s; letter-spacing: 0.02em;
    }
    #clearBtn:hover { border-color: var(--accent-err); color: var(--accent-err); }
  </style>
</head>
<body>

<div id="topbar">
  <h1>drawsync</h1>
  <div class="dot-status"><div class="dot" id="connDot"></div><span id="connLabel">offline</span></div>
  <button id="themeToggle" onclick="toggleTheme()" title="Toggle Theme">
    <svg id="moonIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    <svg id="sunIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
  </button>
</div>

<div id="toolbar">
  <button class="tool-btn active" data-tool="pen"    data-tip="Pen"    onclick="setTool(this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
  </button>
  <button class="tool-btn" data-tool="brush"  data-tip="Brush"  onclick="setTool(this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 3a3 3 0 00-3 3l-4 4-2-2-4.5 4.5A5 5 0 0011 19c2 0 3.5-1 4.5-2.5L18 12l-2-2 4-4a3 3 0 000-3z"/></svg>
  </button>
  <button class="tool-btn" data-tool="marker" data-tip="Marker" onclick="setTool(this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="8" width="18" height="8" rx="2"/><path d="M21 12H3"/></svg>
  </button>
  <button class="tool-btn" data-tool="chalk"  data-tip="Chalk"  onclick="setTool(this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20L20 4"/><circle cx="7" cy="17" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="17" cy="7" r="1.2" fill="currentColor" stroke="none"/></svg>
  </button>
  <button class="tool-btn" data-tool="spray"  data-tip="Spray"  onclick="setTool(this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="16" r="3"/><path d="M11 16h4"/><path d="M15 13v6"/><circle cx="17" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="20" cy="5" r="1.2" fill="currentColor" stroke="none"/><circle cx="14" cy="5" r="1.2" fill="currentColor" stroke="none"/></svg>
  </button>
  <button class="tool-btn" data-tool="neon"   data-tip="Neon"   onclick="setTool(this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
  </button>
  <div class="tool-sep"></div>
  <button class="tool-btn" data-tool="eraser" data-tip="Eraser" onclick="setTool(this)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 20H7L3 16l13-13 7 7-3 3"/><path d="M6 17l-3-3"/></svg>
  </button>
</div>

<div id="canvas-wrap">
  <canvas id="board" width="860" height="560"></canvas>
</div>

<div id="panel">
  <div>
    <div class="sec-label">Color</div>
    <div id="swatches"></div>
    <input type="color" id="customColor" value="#1a1a18" title="Custom">
  </div>
  <div>
    <div class="sec-label">Preview</div>
    <div id="brushPreviewWrap"><canvas id="brushPreview" width="196" height="52"></canvas></div>
  </div>
  <div>
    <div class="slider-row">
      <div class="sec-label" style="margin:0">Size</div>
      <span class="slider-val" id="sizeVal">4px</span>
    </div>
    <input type="range" id="sizeSlider" min="1" max="40" value="4">
  </div>
  <div>
    <div class="slider-row">
      <div class="sec-label" style="margin:0">Opacity</div>
      <span class="slider-val" id="opacityVal">100%</span>
    </div>
    <input type="range" id="opacitySlider" min="5" max="100" value="100">
  </div>
  <div>
    <div class="sec-label">Info</div>
    <div class="stat-row"><span>Tool</span><span class="stat-val" id="statTool">pen</span></div>
  </div>
  <div>
    <div class="sec-label">Log</div>
    <div id="log"></div>
  </div>
  <button id="clearBtn" onclick="clearBoard()">Clear canvas</button>
</div>

<script>
const canvas = document.getElementById("board")
const ctx    = canvas.getContext("2d")
ctx.lineCap  = "round"; ctx.lineJoin = "round"

const PALETTE = [
  "#1a1a18","#3d3d3a","#6b6b67","#a8a8a4","#ffffff",
  "#dc2626","#ea580c","#ca8a04","#16a34a","#0284c7",
  "#7c3aed","#db2777","#0d9488","#65a30d","#c2410c",
  "#f87171","#fdba74","#fde68a","#bbf7d0","#bfdbfe"
]

let state = { tool: "pen", color: "#1a1a18", size: 4, opacity: 1.0 }
let drawing = false, prevX = 0, prevY = 0, strokeCount = 0

// ✅ CRDT CORE
const userId = crypto.randomUUID()
let localSeq = 0
const seen = new Set()
let pending = []

let ws = null, wsConnected = false

function toggleTheme() {
  const doc = document.documentElement;
  if (doc.getAttribute('data-theme') === 'dark') {
    doc.removeAttribute('data-theme');
    document.getElementById('moonIcon').style.display = 'block';
    document.getElementById('sunIcon').style.display = 'none';
  } else {
    doc.setAttribute('data-theme', 'dark');
    document.getElementById('moonIcon').style.display = 'none';
    document.getElementById('sunIcon').style.display = 'block';
  }
}

// ✅ CONNECT + OFFLINE SYNC
function connectWS() {
  try {
    ws = new WebSocket("ws://localhost:3000")

    ws.onopen = () => {
      wsConnected = true
      updateConn()
      addLog("connected :3000", "connect")

      // 🔥 SEND OFFLINE STROKES
      if (pending.length > 0) {
        ws.send(JSON.stringify({
          type: "batch",
          strokes: pending
        }))
        pending = []
        addLog("synced offline strokes", "sync")
      }
    }

    ws.onclose = () => {
      wsConnected = false
      updateConn()
      addLog("disconnected — retry 3s", "connect")
      setTimeout(connectWS, 3000)
    }

    ws.onerror = () => {
      wsConnected = false
      updateConn()
    }

    ws.onmessage = e => {
      const d = JSON.parse(e.data)

      if (d.type === "init") {
        d.strokes.forEach(s => drawStroke(s, false))
        addLog("replayed strokes", "sync")
      }

      if (d.type === "stroke") {
        drawStroke(d, false)
      }

      if (d.type === "clear") {
        ctx.clearRect(0,0,canvas.width,canvas.height)
        seen.clear()
        addLog("remote clear","sync")
      }
    }
  } catch {
    addLog("offline mode", "connect")
  }
}
connectWS()

// Swatches (unchanged)
const sw = document.getElementById("swatches")
PALETTE.forEach(hex => {
  const el = document.createElement("div")
  el.className = "swatch" + (hex === state.color ? " active" : "")
  el.style.background = hex
  if (hex === "#ffffff") el.style.boxShadow = "inset 0 0 0 1px var(--border)"
  el.onclick = () => {
    document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"))
    el.classList.add("active")
    state.color = hex
    document.getElementById("customColor").value = hex
    renderBrushPreview()
  }
  sw.appendChild(el)
})

document.getElementById("customColor").oninput = e => {
  state.color = e.target.value
  document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"))
  renderBrushPreview()
}

document.getElementById("sizeSlider").oninput = e => {
  state.size = +e.target.value
  document.getElementById("sizeVal").textContent = state.size + "px"
  renderBrushPreview()
}

document.getElementById("opacitySlider").oninput = e => {
  state.opacity = +e.target.value / 100
  document.getElementById("opacityVal").textContent = e.target.value + "%"
  renderBrushPreview()
}

function setTool(btn) {
  document.querySelectorAll(".tool-btn").forEach(b => b.classList.remove("active"))
  btn.classList.add("active")
  state.tool = btn.dataset.tool
  document.getElementById("statTool").textContent = state.tool
  renderBrushPreview()
}

// 🎯 DRAW EVENTS
canvas.addEventListener("mousedown", e => {
  drawing = true
  const r = canvas.getBoundingClientRect()
  prevX = e.clientX - r.left
  prevY = e.clientY - r.top
})

canvas.addEventListener("mouseup", () => drawing = false)
canvas.addEventListener("mouseleave", () => drawing = false)

canvas.addEventListener("mousemove", e => {
  if (!drawing) return

  const r = canvas.getBoundingClientRect()
  const x = e.clientX - r.left
  const y = e.clientY - r.top

  // ✅ CRDT STROKE
  const s = {
    id: crypto.randomUUID(),
    userId: userId,
    seq: localSeq++,

    type: "stroke",
    tool: state.tool,
    color: state.color,
    size: state.size,
    opacity: state.opacity,
    x0: prevX,
    y0: prevY,
    x1: x,
    y1: y
  }

  drawStroke(s, true)

  if (wsConnected && ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(s))
  } else {
    pending.push(s)
  }

  prevX = x
  prevY = y
})

// 🎨 APPLY STROKE (UNCHANGED)
function applyStroke(c, s) {
  c.save()
  c.lineCap = "round"
  c.lineJoin = "round"
  c.globalAlpha = s.opacity ?? 1.0

  switch (s.tool) {

    case "pen":
      c.strokeStyle = s.color
      c.lineWidth = s.size * 0.6
      c.beginPath()
      c.moveTo(s.x0, s.y0)
      c.lineTo(s.x1, s.y1)
      c.stroke()
      break

    case "brush":
      const br = 6
      c.globalAlpha = (s.opacity ?? 1) * 0.3
      for (let i = 0; i < br; i++) {
        const o = (i - br / 2) * (s.size * 0.25)
        c.strokeStyle = s.color
        c.lineWidth = s.size * 0.4
        c.beginPath()
        c.moveTo(s.x0 + o, s.y0 + o * 0.4)
        c.lineTo(s.x1 + o, s.y1 + o * 0.4)
        c.stroke()
      }
      break

    case "marker":
      c.strokeStyle = s.color
      c.lineWidth = s.size * 2.5
      c.globalAlpha = Math.min((s.opacity ?? 1) * 0.55, 0.7)
      c.lineCap = "square"
      c.beginPath()
      c.moveTo(s.x0, s.y0)
      c.lineTo(s.x1, s.y1)
      c.stroke()
      break

    case "chalk":
      const cd = Math.hypot(s.x1 - s.x0, s.y1 - s.y0)
      const cs = Math.max(1, Math.floor(cd * 1.5))
      c.fillStyle = s.color
      c.globalAlpha = (s.opacity ?? 1) * 0.07
      for (let i = 0; i <= cs; i++) {
        const t = i / cs
        const cx = s.x0 + (s.x1 - s.x0) * t
        const cy = s.y0 + (s.y1 - s.y0) * t
        const sp = s.size * 0.9
        for (let j = 0; j < 8; j++) {
          c.beginPath()
          c.arc(
            cx + (Math.random() - 0.5) * sp * 2,
            cy + (Math.random() - 0.5) * sp * 2,
            Math.random() * s.size * 0.25 + 0.3,
            0,
            Math.PI * 2
          )
          c.fill()
        }
      }
      break

    case "spray":
      const sd = Math.hypot(s.x1 - s.x0, s.y1 - s.y0)
      const ss = Math.max(1, Math.floor(sd * 0.5))
      c.fillStyle = s.color
      for (let i = 0; i <= ss; i++) {
        const t = i / ss
        const cx = s.x0 + (s.x1 - s.x0) * t
        const cy = s.y0 + (s.y1 - s.y0) * t
        const r = s.size * 2.5
        for (let j = 0; j < 25; j++) {
          const a = Math.random() * Math.PI * 2
          const rad = Math.sqrt(Math.random()) * r
          c.globalAlpha = (1 - rad / r) * (s.opacity ?? 1) * 0.35
          c.beginPath()
          c.arc(cx + Math.cos(a) * rad, cy + Math.sin(a) * rad, Math.random() * 0.8 + 0.2, 0, Math.PI * 2)
          c.fill()
        }
      }
      break

    case "neon":
      c.globalCompositeOperation = "multiply"
      ;[
        { w: s.size * 6, a: 0.04 },
        { w: s.size * 3, a: 0.12 },
        { w: s.size * 1.2, a: 0.35 },
        { w: s.size * 0.4, a: 0.95 }
      ].forEach(l => {
        c.strokeStyle = s.color
        c.lineWidth = l.w
        c.globalAlpha = l.a * (s.opacity ?? 1)
        c.shadowColor = s.color
        c.shadowBlur = l.w * 1.5
        c.beginPath()
        c.moveTo(s.x0, s.y0)
        c.lineTo(s.x1, s.y1)
        c.stroke()
      })
      c.shadowBlur = 0
      c.globalCompositeOperation = "source-over"
      break

    case "eraser":
      c.globalCompositeOperation = "destination-out"
      c.lineWidth = s.size * 3
      c.beginPath()
      c.moveTo(s.x0, s.y0)
      c.lineTo(s.x1, s.y1)
      c.stroke()
      c.globalCompositeOperation = "source-over"
      break
  }

  c.restore()
}

// ✅ DEDUP
function drawStroke(s, isLocal) {
  if (seen.has(s.id)) return
  seen.add(s.id)

  applyStroke(ctx, s)

  if (isLocal) {
    strokeCount++
    if (strokeCount % 15 === 0) addLog("using " + s.tool, "stroke")
  }
}

function renderBrushPreview() {
  const pc = document.getElementById("brushPreview")
  const p = pc.getContext("2d")
  p.clearRect(0,0,pc.width,pc.height)

  applyStroke(p, {
    tool: state.tool,
    color: state.color,
    size: state.size,
    opacity: state.opacity,
    x0: 14,
    y0: 26,
    x1: pc.width - 14,
    y1: 26
  })
}
renderBrushPreview()

function updateConn() {
  document.getElementById("connDot").className = "dot" + (wsConnected ? " ok" : "")
  document.getElementById("connLabel").textContent = wsConnected ? "connected" : "offline"
}

function addLog(msg, type="stroke") {
  const log = document.getElementById("log")
  const ts  = new Date().toLocaleTimeString("en-US",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"})
  const el  = document.createElement("div")
  el.className = "log-entry " + type
  el.textContent = ts + "  " + msg
  log.insertBefore(el, log.firstChild)
  while (log.children.length > 40) log.removeChild(log.lastChild)
}

function clearBoard() {
  ctx.clearRect(0,0,canvas.width,canvas.height)
  seen.clear()
  addLog("canvas cleared","sync")

  if (wsConnected && ws?.readyState===WebSocket.OPEN) {
    ws.send(JSON.stringify({type:"clear"}))
  }
}

addLog("ready", "connect")
</script>
